version: 2
updates:
  # GitHub Actions - Weekly checks
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automation"
    reviewers:
      - "Purzel149"
    commit-message:
      prefix: "chore: "
      include: "scope"
