name: Shell script checks

on:
  pull_request:
    paths:
      - "**.sh"
      - ".github/workflows/test-scripts.yml"
  push:
    branches:
      - main
    paths:
      - "**.sh"
      - ".github/workflows/test-scripts.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Check shell syntax and lint scripts
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' script; do
            echo "Syntax check: $script"
            bash -n -- "$script"

            if command -v shellcheck >/dev/null 2>&1; then
              echo "ShellCheck: $script"
              shellcheck -x -- "$script"
            else
              echo "ShellCheck nicht verfügbar – Syntaxprüfung war erfolgreich."
            fi
          done < <(find . -path './.git' -prune -o -type f -name '*.sh' -print0)